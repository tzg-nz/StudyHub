services:
  - type: web
    name: studyhub-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: studyhub-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: studyhub-api-16oa.onrender.com,*.onrender.com
  - type: pserv
    name: studyhub-db
    databaseName: studyhub
    user: studyhub_user
    plan: free
